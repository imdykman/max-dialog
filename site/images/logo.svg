<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="100%" height="100%">
 <defs>
    <!-- Основные градиенты логотипа -->
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#00796B" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00A251" />
      <stop offset="100%" stop-color="#004D40" />
    </linearGradient>
    
    <!-- ЧАСТАЯ СЕТКА: Повторяющийся паттерн из мелких иконок сообщений и линий -->
    <pattern id="msg-grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Тонкие линии сетки -->
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.04" />
      <!-- Мелкая частая иконка сообщения в каждой ячейке (размер всего 16x12 пикселей) -->
      <path d="M 12,14 H 24 A 2,2 0 0 1 26,16 V 24 A 2,2 0 0 1 24,26 H 17 L 14,29 V 26 H 12 A 2,2 0 0 1 10,24 V 16 A 2,2 0 0 1 12,14 Z" 
            fill="none" stroke="#00796B" stroke-width="1" opacity="0.09" />
      <!-- Точка пересечения линий связи -->
      <circle cx="45" cy="45" r="1" fill="#00E676" opacity="0.15" />
    </pattern>
  </defs>

  <!-- 1. ЗАПОЛНЕНИЕ ФОНА ЧАСТОЙ СЕТКОЙ -->
  <rect width="100%" height="100%" fill="url(#msg-grid)" />

  <!-- 2. КРУПНЫЕ ДЕКОРАТИВНЫЕ ЭЛЕМЕНТЫ (Круги + Футуристичные ромбы) -->
  <g fill="none" stroke-width="1" opacity="0.06">
    <!-- Верхняя правая зона -->
    <circle cx="430" cy="70" r="120" stroke="#00E676" />
    <path d="M 430,20 L 480,70 L 430,120 L 380,70 Z" stroke="#00E676" stroke-dasharray="3,3" /> <!-- Ромб -->
    
    <!-- Нижная левая зона -->
    <circle cx="60" cy="380" r="90" stroke="#00796B" />
    <path d="M 60,340 L 100,380 L 60,420 L 20,380 Z" stroke="#00796B" /> <!-- Ромб -->
    <circle cx="60" cy="380" r="40" stroke="#00E676" stroke-dasharray="2,2" />
  </g>

  <!-- 3. ПЕРЕДНИЙ ПЛАН: Основной логотип с наклоном -->
  <g transform="skewX(-11) translate(50, 15)">
    <path d="M 210,20 L 360,20 L 360,220 L 260,220 L 260,120 L 210,120 Z" fill="url(#grad2)" />
    <rect x="110" y="140" width="110" height="110" fill="url(#grad1)" />
    <text x="220" y="325" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="44" 
          font-weight="bold" 
          fill="#111111" 
          text-anchor="middle" 
          letter-spacing="1.5">MAX-DIALOG</text>
  </g>
</svg>